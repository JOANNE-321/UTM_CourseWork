version: "3.8"

services:
  postgres:
    image: postgres:13
    container_name: censo_postgres
    environment:
      POSTGRES_USER: censo
      POSTGRES_PASSWORD: 123
      POSTGRES_DB: censo_escolar
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  metabase:
    image: metabase/metabase
    container_name: censo_metabase
    ports:
      - "3000:3000"
    depends_on:
      - postgres

volumes:
  postgres_data:
